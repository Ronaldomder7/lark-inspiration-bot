name: shell

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  syntax-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: bash -n on all scripts
        run: |
          set -e
          for f in install.sh uninstall.sh scripts/*.sh; do
            echo "checking $f"
            bash -n "$f"
          done

      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: '.'
          ignore_paths: 'templates docs'
